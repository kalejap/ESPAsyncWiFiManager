<h3><!--L_MQTT_SETTINGS-->MQTT Settings</h3>
<div class='inpgrp'>
  <label><!--L_MQTT_SERVER-->Server</label>
  <input value='%{mqttserv}%' id='mqttserv' name='mqttserv' length=32 placeholder=''>
  <label><!--L_MQTT_PORT-->Port</label>
  <input value='%{mqttport}%' id='mqttport' name='mqttport' length=64 placeholder='1883'>
  <label><!--L_MQTT_USER-->User</label>
  <input value='%{mqttuser}%' id='mqttuser' name='mqttuser' length=32 placeholder=''>
  <label><!--L_MQTT_PASSWORD-->Password</label>
  <input value='%{mqttpwd}%' id='mqttpwd' name='mqttpwd' length=64 placeholder=''>
</div>
